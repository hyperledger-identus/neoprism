# markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow long lines (common in tables, URLs, and generated content)
MD013: false

# Allow multiple top-level headings (common in multi-section docs)
MD025: false

# Allow inline HTML (needed for badges, details/summary, etc.)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow first line to be HTML (centered logos in READMEs)
MD041: false

# Allow sequential ordered list numbering (1, 2, 3 instead of 1, 1, 1)
MD029:
  style: "ordered"

# Allow emphasis used as heading (common in docs)
MD036: false

# Allow non-descriptive link text like "here" (legacy docs)
MD059: false

# Allow code blocks without language (configuration docs use plain blocks)
MD040: false

# Allow blank lines inside blockquotes (used for spacing in admonitions)
MD028: false

# Disable table column style check (rule added in markdownlint v0.39.0,
# not available in nix markdownlint v0.38.0 — cannot verify locally)
MD060: false
